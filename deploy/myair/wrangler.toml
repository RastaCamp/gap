# Leerie account (0f42c247e489dce80771116c30c57c3e) — see deploy/LEERIE_ACCOUNT_SETUP.md
name = "rastacamp-myair"
compatibility_date = "2026-05-19"
pages_build_output_dir = "dist"

# On Leerie account: wrangler d1 create myair-db → paste id below → npm run db:migrate
[[d1_databases]]
binding = "DB"
database_name = "myair-db"
database_id = "REPLACE_ON_LEERIE_ACCOUNT"

[vars]
MONTHLY_PRICE_USD = "20"
REQUIRE_PAID_API = "true"
ALLOW_PUBLIC_REGISTER = "true"
STRIPE_PRODUCT_NAME = "MyAir API"
