name: Deploy watersafe to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "deploy/watersafe/**"
      - "watersafe-api/frontend/**"
      - "common/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & build
        working-directory: deploy/watersafe
        run: |
          npm ci || npm install
          npm install --prefix ../../watersafe-api/frontend
          npm run build

      - name: Apply D1 schema (remote)
        working-directory: deploy/watersafe
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute watersafe-db --remote --file=./schema.sql || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=watersafe
