name: Add rastacamp DNS records

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Add biosurge and watersafe CNAME records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE=cf52be49bca453715fc5e899b6941fef
          add_cname() {
            local name="$1"
            local target="$2"
            existing=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?type=CNAME&name=${name}.rastacamp.com" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            if echo "$existing" | grep -q "\"count\":0"; then
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"CNAME\",\"name\":\"$name\",\"content\":\"$target\",\"proxied\":true,\"ttl\":1}"
            else
              echo "$name already exists"
              echo "$existing"
            fi
          }
          add_cname biosurge biosurge-7jp.pages.dev
          add_cname watersafe watersafe-1og.pages.dev
