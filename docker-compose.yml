# GAP stack — builds from repo root so `gap-common` (file:../common) resolves.
# Prerequisite: Docker engine running (e.g. start Docker Desktop on Windows).
#
# One product:
#   docker compose up --build foodsafe-api foodsafe-web
#
# Add env per API by uncommenting env_file on each *-api service.
# Full stack (9 APIs + 9 UIs + static HTML hub on :8090):
#   docker compose up --build
#
# Host port clashes (e.g. local Bun already on 3001): use alternate publish ports:
#   docker compose --env-file docker/ports-alt.env up -d foodsafe-api foodsafe-web

name: gap

services:
  foodsafe-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        API_SUBDIR: foodsafe-api
    environment:
      PORT: "3001"
    ports:
      - "${GAP_PORT_FOODSAFE_API:-3001}:3001"
    volumes:
      - foodsafe_api_data:/app/foodsafe-api/data
    restart: unless-stopped

  foodsafe-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        API_SUBDIR: foodsafe-api
    environment:
      UPSTREAM_API_HOST: foodsafe-api
      UPSTREAM_API_PORT: "3001"
    ports:
      - "${GAP_PORT_FOODSAFE_WEB:-5173}:80"
    depends_on:
      - foodsafe-api
    restart: unless-stopped

